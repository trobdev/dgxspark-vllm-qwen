<text x="235" y="252" text-anchor="middle" font-family="'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif" font-size="11" fill="rgb(80,90,120)">hoists system[] → top-level system</text>

<!-- ── Arrow: shim → vLLM ── -->
<line x1="240" y1="266" x2="300" y2="300" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

