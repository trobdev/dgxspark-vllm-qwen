<svg width="100%" viewBox="0 0 680 614" role="img" xmlns="http://www.w3.org/2000/svg">
<title>DGX Spark LLM Stack — current architecture</title>
<desc>Architecture diagram: Claude Code sends Anthropic /v1/messages requests through Nginx to a stdlib normalizing shim that hoists system-role messages into the top-level system field before forwarding to vLLM; OpenAI-compatible clients connect through Nginx straight to vLLM. A single vLLM instance runs Qwen3.6-35B-A3B-NVFP4 (NVFP4 weights via the Marlin weight-only path) on a DGX Spark GB10 Grace Blackwell with 128 GB unified memory.</desc>

<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- ── Row 1: Clients ── -->

<rect x="50" y="20" width="220" height="54" rx="4" fill="rgb(241,239,232)" stroke="rgb(95,94,90)" stroke-width="0.5"/>
<text x="160" y="42" text-anchor="middle" font-family="'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif" font-size="14" font-weight="500" fill="rgb(68,68,65)">Claude Code + IDEs</text>
<text x="160" y="58" text-anchor="middle" font-family="'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif" font-size="12" fill="rgb(95,94,90)">claude-local  ·  Anthropic API format</text>

<rect x="410" y="20" width="220" height="54" rx="4" fill="rgb(241,239,232)" stroke="rgb(95,94,90)" stroke-width="0.5"/>
<text x="520" y="42" text-anchor="middle" font-family="'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif" font-size="14" font-weight="500" fill="rgb(68,68,65)">API Clients</text>
<text x="520" y="58" text-anchor="middle" font-family="'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif" font-size="12" fill="rgb(95,94,90)">Continue  ·  curl  ·  OpenAI-compatible apps</text>

<!-- ── Arrows: clients → Nginx (both converge) ── -->
<line x1="160" y1="74" x2="290" y2="103" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text x="120" y="93" text-anchor="middle" font-family="'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif" font-size="11" fill="rgb(61,61,58)">:80 /coding (Anthropic)</text>

<line x1="520" y1="74" x2="390" y2="103" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text x="560" y="93" text-anchor="middle" font-family="'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif" font-size="11" fill="rgb(61,61,58)">:80 /coding/v1 (OpenAI)</text>

<!-- ── Row 2: Nginx (single front door) ── -->
<rect x="170" y="104" width="340" height="74" rx="4" fill="rgb(238,237,254)" stroke="rgb(83,74,183)" stroke-width="0.5"/>
<text x="340" y="126" text-anchor="middle" font-family="'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif" font-size="14" font-weight="500" fill="rgb(60,52,137)">Nginx  ·  :80 / :443</text>
<text x="340" y="143" text-anchor="middle" font-family="'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif" font-size="12" fill="rgb(83,74,183)">reverse proxy  ·  streaming  ·  proxy_buffering off</text>
<text x="340" y="160" text-anchor="middle" font-family="'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif" font-size="12" fill="rgb(83,74,183)">/coding/v1/messages → shim   ·   /coding/* → vLLM</text>

<!-- Docker network label strip -->
<rect x="40" y="186" width="600" height="12" rx="2" fill="none" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="4,2"/>
<text x="340" y="195" text-anchor="middle" font-family="'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif" font-size="10" fill="rgb(95,94,90)">docker network: llm-net  ·  shared volume: /data/models  ·  vLLM ≥0.19  ·  driver 580.x</text>

<!-- ── Arrow: Nginx → shim (Anthropic path) ── -->
<line x1="290" y1="178" x2="255" y2="214" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<!-- ── Arrow: Nginx → vLLM (OpenAI direct path) ── -->
<line x1="415" y1="178" x2="425" y2="300" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text x="470" y="250" text-anchor="middle" font-family="'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif" font-size="10" fill="rgb(95,94,90)">OpenAI (direct)</text>

