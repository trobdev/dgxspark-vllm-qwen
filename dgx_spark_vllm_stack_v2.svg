<rect x="150" y="300" width="380" height="92" rx="4" fill="rgb(234,243,222)" stroke="rgb(59,109,17)" stroke-width="0.5"/>
<text x="340" y="322" text-anchor="middle" font-family="'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif" font-size="14" font-weight="500" fill="rgb(39,80,10)">vLLM — coding</text>
<text x="340" y="338" text-anchor="middle" font-family="'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif" font-size="12" fill="rgb(59,109,17)">Qwen3.6-35B-A3B-NVFP4  ·  serves OpenAI + Anthropic APIs</text>
<text x="340" y="354" text-anchor="middle" font-family="'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif" font-size="12" fill="rgb(59,109,17)">128K context  ·  MoE ~3B active (8/256 experts)  ·  NVFP4 weights</text>
<text x="340" y="370" text-anchor="middle" font-family="'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif" font-size="12" fill="rgb(59,109,17)">reasoning-parser qwen3  ·  tool-call-parser qwen3_coder  ·  prefix caching</text>

<!-- ── Arrow: vLLM → NVIDIA ── -->
<line x1="340" y1="392" x2="340" y2="412" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<!-- ── Row 4: NVIDIA container runtime ── -->
<rect x="40" y="412" width="600" height="54" rx="4" fill="rgb(250,238,218)" stroke="rgb(133,79,11)" stroke-width="0.5"/>
<text x="340" y="434" text-anchor="middle" font-family="'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif" font-size="14" font-weight="500" fill="rgb(99,56,6)">NVIDIA container runtime</text>
<text x="340" y="450" text-anchor="middle" font-family="'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif" font-size="12" fill="rgb(133,79,11)">CUDA  ·  NVFP4 weight-only via Marlin (→ BF16)  ·  PagedAttention  ·  prefix caching</text>

<!-- ── Arrow: NVIDIA → DGX ── -->
<line x1="340" y1="466" x2="340" y2="486" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

